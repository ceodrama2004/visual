<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DMH - Digital Marketing Helper</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(22, 27, 34, 0.7);
            --accent-color: #2f81f7;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --premium-gradient: linear-gradient(180deg, #FFFFFF 0%, #A3A3A3 100%);
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 20px;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* [1] PRELOADER */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            transition: opacity 0.6s ease;
        }
        .loader-logo { 
            font-size: 42px; font-weight: 800; letter-spacing: -2px; 
            background: var(--premium-gradient); 
            background-clip: text;
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            margin-bottom: 20px; 
        }

        /* [2] MAIN HUB */
        #main-hub { opacity: 0; transform: translateY(15px); transition: all 0.8s ease; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; margin: 40px 0 50px 0; }
        .badge { font-size: 10px; color: var(--accent-color); letter-spacing: 3px; text-transform: uppercase; font-weight: 700; margin-bottom: 12px; display: block; }
        
        h1 { 
            font-size: 36px; line-height: 1.1; font-weight: 800; letter-spacing: -1.5px; 
            background: var(--premium-gradient); 
            background-clip: text;
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
        }

        .hub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; max-width: 380px; }
        .hub-item { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 28px; padding: 24px 10px; display: flex; flex-direction: column; align-items: center; gap: 12px; transition: 0.3s; }
        .hub-item:active { transform: scale(0.94); background: rgba(47, 129, 247, 0.1); }

        /* [3] INSTAGRAM HELPER PAGE */
        #inst-page { display: none; opacity: 0; transition: 0.4s ease; width: 100%; }
        .back-link { color: var(--text-dim); font-size: 14px; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

        .tool-button { 
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); 
            padding: 20px; border-radius: 24px; display: flex; align-items: center; 
            gap: 16px; margin-bottom: 12px; transition: 0.2s;
        }
        .tool-button:active { transform: scale(0.98); background: rgba(255,255,255,0.03); }

        /* [4] ANALYTICS MODULE (INPUT) */
        #analytics-view { display: none; width: 100%; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        input {
            width: 100%; background: #000; border: 1px solid rgba(255,255,255,0.1);
            padding: 20px; border-radius: 18px; color: #fff; font-size: 16px;
            text-align: center; outline: none; box-sizing: border-box; margin: 20px 0;
        }
        
        .btn-main {
            width: 100%; background: #fff; color: #000; border: none;
            padding: 20px; border-radius: 20px; font-weight: 700; font-size: 16px;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-logo">DMH</div>
    </div>

    <div id="main-hub">
        <header>
            <span class="badge">Welcome to DMH</span>
            <h1>Digital Marketing<br>Helper</h1>
        </header>
        <div class="hub-grid">
            <div class="hub-item" onclick="showPage('inst-page')">
                <i class="fa-brands fa-instagram" style="font-size: 24px; color: var(--accent-color);"></i>
                <span style="font-size: 13px; font-weight: 600;">Instagram Helper</span>
            </div>
            <div class="hub-item" style="opacity: 0.3;">
                <i class="fa-solid fa-globe" style="font-size: 24px;"></i>
                <span style="font-size: 13px; font-weight: 600;">Web Analyzer</span>
            </div>
        </div>
    </div>

    <div id="inst-page">
        <div class="back-link" onclick="showPage('main-hub')"><i class="fa-solid fa-arrow-left"></i> Назад в Hub</div>
        <h2 style="font-size: 32px; margin-bottom: 30px;">Instagram Helper</h2>
        
        <div class="tool-button" onclick="showView('analytics-view')">
            <i class="fa-solid fa-chart-pie" style="font-size: 20px; color: var(--accent-color);"></i>
            <div style="flex-grow: 1;">
                <h4 style="margin: 0; font-size: 16px;">Аналитика</h4>
                <p style="margin: 4px 0 0 0; font-size: 12px; color: var(--text-dim);">Разбор конкурентов и офферов</p>
            </div>
            <i class="fa-solid fa-chevron-right" style="color: var(--text-dim); font-size: 12px;"></i>
        </div>
    </div>

    <div id="analytics-view">
        <div class="back-link" onclick="showPage('inst-page')"><i class="fa-solid fa-arrow-left"></i> К списку инструментов</div>
        <div style="background: var(--card-bg); padding: 30px; border-radius: 32px; border: 1px solid rgba(255,255,255,0.05);">
            <h3 style="margin-top: 0;">Запуск анализа</h3>
            <p style="color: var(--text-dim); font-size: 14px;">Введите никнейм для проверки AI-ассистентом</p>
            <input type="text" id="username" placeholder="@username">
            <button class="btn-main" onclick="startAI()">АНАЛИЗИРОВАТЬ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#050505";

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('main-hub').style.opacity = '1';
                    document.getElementById('main-hub').style.transform = 'translateY(0)';
                }, 600);
            }, 1000);
        };

        function showPage(id) {
            tg.HapticFeedback.impactOccurred('medium');
            document.getElementById('main-hub').style.display = 'none';
            document.getElementById('inst-page').style.display = 'none';
            document.getElementById('analytics-view').style.display = 'none';
            
            const target = document.getElementById(id);
            target.style.display = 'block';
            setTimeout(() => target.style.opacity = '1', 50);
        }

        function showView(id) {
            tg.HapticFeedback.impactOccurred('medium');
            document.getElementById('inst-page').style.display = 'none';
            document.getElementById(id).style.display = 'block';
        }

        function startAI() {
            let user = document.getElementById('username').value;
            if(!user) return tg.showAlert("Введите ник!");
            tg.MainButton.setText("AI ANALYZING...").show();
            setTimeout(() => {
                tg.MainButton.hide();
                tg.showAlert("Анализ " + user + " начат. Скоро здесь будет отчет!");
            }, 2000);
        }
    </script>
</body>
</html>
