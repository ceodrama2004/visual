<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DMH - Digital Marketing Helper</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(22, 27, 34, 0.7);
            --accent-color: #2f81f7;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --premium-gradient: linear-gradient(180deg, #FFFFFF 0%, #A3A3A3 100%);
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 20px;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* [1] PRELOADER */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
            transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .loader-logo { font-size: 42px; font-weight: 800; letter-spacing: -2px; background: var(--premium-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
        .loader-bar { width: 120px; height: 1px; background: rgba(255,255,255,0.1); position: relative; overflow: hidden; }
        .loader-bar::after { content: ''; position: absolute; left: -100%; width: 100%; height: 100%; background: var(--accent-color); animation: load 1.6s infinite; }
        @keyframes load { 0% { left: -100%; } 100% { left: 100%; } }

        /* [2] MAIN HUB (CENTERED) */
        #main-hub { opacity: 0; transform: translateY(15px); transition: all 0.8s ease; display: flex; flex-direction: column; align-items: center; }
        header { text-align: center; margin: 40px 0 50px 0; }
        .badge { font-size: 10px; color: var(--accent-color); letter-spacing: 3px; text-transform: uppercase; font-weight: 700; margin-bottom: 12px; display: block; }
        h1 { font-size: 36px; line-height: 1.1; font-weight: 800; letter-spacing: -1.5px; background: var(--premium-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .hub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; max-width: 380px; }
        .hub-item { background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); border-radius: 28px; padding: 24px 10px; display: flex; flex-direction: column; align-items: center; gap: 12px; transition: 0.3s; }
        .hub-item:active { transform: scale(0.94); background: rgba(47, 129, 247, 0.1); }
        .hub-icon { width: 48px; height: 48px; background: rgba(47, 129, 247, 0.1); border-radius: 16px; display: flex; align-items: center; justify-content: center; color: var(--accent-color); font-size: 20px; }

        /* [3] INSTAGRAM HELPER PAGE (FULL SCREEN) */
        #inst-helper-page { display: none; opacity: 0; transform: translateX(20px); transition: all 0.4s ease; width: 100%; }
        .page-header { margin-bottom: 30px; }
        .back-link { color: var(--text-dim); font-size: 14px; text-decoration: none; display: flex; align-items: center; gap: 6px; margin-bottom: 20px; }

        /* ДЛИННЫЕ КНОПКИ */
        .tool-list { display: flex; flex-direction: column; gap: 12px; width: 100%; }
        .tool-button { 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.05); 
            padding: 20px; 
            border-radius: 22px; 
            display: flex; 
            align-items: center; 
            gap: 16px; 
            transition: 0.2s;
            cursor: pointer;
        }
        .tool-button:active { transform: scale(0.98); background: rgba(255,255,255,0.03); }
        .tool-info { flex-grow: 1; }
        .tool-info h4 { margin: 0; font-size: 16px; font-weight: 600; }
        .tool-info p { margin: 4px 0 0 0; font-size: 12px; color: var(--text-dim); }
        .tool-chevron { color: var(--text-dim); font-size: 14px; }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-logo">DMH</div>
        <div class="loader-bar"></div>
    </div>

    <div id="main-hub">
        <header>
            <span class="badge">Welcome to DMH</span>
            <h1>Digital Marketing<br>Helper</h1>
        </header>

        <div class="hub-grid">
            <div class="hub-item" onclick="openInstHelper()">
                <div class="hub-icon"><i class="fa-brands fa-instagram"></i></div>
                <span style="font-size: 13px; font-weight: 600;">Instagram Helper</span>
            </div>
            <div class="hub-item" style="opacity: 0.3;">
                <div class="hub-icon"><i class="fa-solid fa-globe"></i></div>
                <span style="font-size: 13px; font-weight: 600;">Web Analyzer</span>
            </div>
        </div>
    </div>

    <div id="inst-helper-page">
        <div class="page-header">
            <div class="back-link" onclick="closeInstHelper()">
                <i class="fa-solid fa-chevron-left"></i> Назад в Hub
            </div>
            <span class="badge" style="margin-left: 0;">Service Active</span>
            <h2 style="font-size: 32px; margin: 5px 0 0 0; letter-spacing: -1px;">Instagram Helper</h2>
            <p style="color: var(--text-dim); font-size: 14px; margin-top: 8px;">Выберите инструмент ассистента</p>
        </div>

        <div class="tool-list">
            <div class="tool-button" onclick="startAnalytics()">
                <div class="hub-icon" style="background: rgba(47, 129, 247, 0.15);"><i class="fa-solid fa-magnifying-glass-chart"></i></div>
                <div class="tool-info">
                    <h4>Аналитика</h4>
                    <p>Анализ конкурентов, офферов и стратегии</p>
                </div>
                <i class="fa-solid fa-chevron-right tool-chevron"></i>
            </div>

            <div class="tool-button" style="opacity: 0.4;">
                <div class="hub-icon"><i class="fa-solid fa-pen-nib"></i></div>
                <div class="tool-info">
                    <h4>AI Copywriter</h4>
                    <p>Генерация постов и контент-плана</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = "#050505";
        tg.headerColor = "#050505";

        // ЛОГИКА ЗАГРУЗКИ
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.getElementById('main-hub').style.opacity = '1';
                    document.getElementById('main-hub').style.transform = 'translateY(0)';
                }, 600);
            }, 1500);
        };

        // НАВИГАЦИЯ
        function openInstHelper() {
            tg.HapticFeedback.impactOccurred('medium');
            const hub = document.getElementById('main-hub');
            const page = document.getElementById('inst-helper-page');
            
            hub.style.display = 'none';
            page.style.display = 'block';
            setTimeout(() => {
                page.style.opacity = '1';
                page.style.transform = 'translateX(0)';
            }, 50);
        }

        function closeInstHelper() {
            tg.HapticFeedback.impactOccurred('light');
            const hub = document.getElementById('main-hub');
            const page = document.getElementById('inst-helper-page');
            
            page.style.display = 'none';
            hub.style.display = 'flex';
        }

        function startAnalytics() {
            tg.HapticFeedback.notificationOccurred('success');
            tg.showAlert("Запуск модуля 'Аналитика'. Здесь будет ввод никнейма.");
        }
    </script>
</body>
</html>
