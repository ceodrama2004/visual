<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Digital Helper</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #111418;
            --accent-color: #2f81f7;
            --text-main: #ffffff;
            --text-dim: #8b949e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* ЛОУДЕР DMH */
        #loader {
            position: fixed;
            inset: 0;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        .loader-text {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 8px;
            color: #fff;
        }

        /* ШАПКА КАК НА СКРИНШОТЕ */
        header {
            text-align: center;
            margin: 80px 0 50px 0;
        }
        .welcome-text {
            font-size: 11px;
            color: #2f81f7;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: 800;
            margin-bottom: 20px;
            display: block;
        }
        h1 {
            font-size: 42px;
            margin: 0;
            font-weight: 700;
            line-height: 1.1;
            max-width: 300px;
        }

        /* КАРТОЧКИ 1 К 1 */
        .hub-grid {
            display: flex;
            gap: 15px;
            width: 100%;
            max-width: 360px;
            justify-content: center;
        }

        .hub-item {
            background: var(--card-bg);
            border-radius: 35px;
            width: 160px;
            height: 175px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 18px;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .icon-box {
            background: rgba(47, 129, 247, 0.1);
            width: 55px;
            height: 55px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hub-item i { font-size: 26px; }
        .hub-item span { 
            font-size: 14px; 
            font-weight: 600; 
            text-align: center; 
            line-height: 1.3;
            color: #efefef;
        }
        .locked { opacity: 0.2; }

        /* СКРЫТЫЕ СТРАНИЦЫ И ЛОГИКА */
        #main-hub { width: 100%; display: flex; flex-direction: column; align-items: center; }
        #inst-page, #analytics-view, #reports-archive { display: none; width: 100%; max-width: 400px; }

        .back-link { color: var(--text-dim); margin-bottom: 30px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-weight: 500; }
        
        .tool-card {
            background: var(--card-bg);
            padding: 22px;
            border-radius: 25px;
            display: flex;
            align-items: center;
            gap: 18px;
            margin-bottom: 15px;
        }

        input {
            width: 100%; padding: 20px; border-radius: 20px;
            border: 1px solid #222; background: #000; color: #fff;
            text-align: center; margin: 25px 0; font-size: 18px; box-sizing: border-box;
        }

        .btn-action {
            width: 100%; padding: 20px; border-radius: 20px;
            background: #fff; color: #000; font-weight: 700; border: none; font-size: 16px;
        }
    </style>
</head>
<body>
    <div id="loader"><div class="loader-text">DMH</div></div>

    <div id="main-hub">
        <header>
            <span class="welcome-text">WELCOME TO DMH</span>
            <h1>Digital Marketing Helper</h1>
        </header>
        <div class="hub-grid">
            <div class="hub-item" onclick="showPage('inst-page')">
                <div class="icon-box">
                    <i class="fa-brands fa-instagram" style="color: var(--accent-color);"></i>
                </div>
                <span>Instagram<br>Helper</span>
            </div>
            <div class="hub-item locked">
                <div class="icon-box" style="background: rgba(255,255,255,0.05);">
                    <i class="fa-solid fa-globe" style="color: #333;"></i>
                </div>
                <span>Web Site<br>Analyzer</span>
            </div>
        </div>
    </div>

    <div id="inst-page">
        <div class="back-link" onclick="showPage('main-hub')"><i class="fa-solid fa-chevron-left"></i> Назад</div>
        <h2 style="font-size: 32px; margin-bottom: 30px;">Instagram</h2>
        <div class="tool-card" onclick="showPage('analytics-view')">
            <i class="fa-solid fa-wand-magic-sparkles" style="color: var(--accent-color); font-size: 22px;"></i>
            <div>
                <h4 style="margin:0; font-size: 18px;">Аналитика</h4>
                <p style="margin:5px 0 0 0; font-size:12px; color:var(--text-dim)">Нейросетевой разбор профиля</p>
            </div>
        </div>
        <div class="tool-card" onclick="loadReports().then(() => showPage('reports-archive'))">
            <i class="fa-solid fa-box-archive" style="color: var(--text-dim); font-size: 20px;"></i>
            <div style="margin-left: 5px;">
                <h4 style="margin:0; font-size: 16px;">Архив отчетов</h4>
            </div>
        </div>
    </div>

    <div id="analytics-view">
        <div class="back-link" onclick="showPage('inst-page')"><i class="fa-solid fa-chevron-left"></i> Назад</div>
        <div style="text-align: center;">
            <h3 style="font-size: 24px;">Анализ профиля</h3>
            <input type="text" id="username" placeholder="username">
            <button class="btn-action" onclick="startAI()">ЗАПУСТИТЬ</button>
        </div>
    </div>

    <div id="reports-archive"></div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // Скрытие лоадера через 1.5 секунды
        window.onload = () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 1500);
        };

        function showPage(id) {
            ['main-hub', 'inst-page', 'analytics-view', 'reports-archive'].forEach(p => {
                document.getElementById(p).style.display = 'none';
            });
            document.getElementById(id).style.display = 'block';
        }

        async function startAI() {
            const user = document.getElementById('username').value;
            if(!user) return tg.showAlert("Ник не введен");
            try {
                const response = await fetch('http://127.0.0.1:8000/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: user, user_id: 0})
                });
                const res = await response.json();
                tg.showAlert(res.message);
                showPage('inst-page');
            } catch(e) { tg.showAlert("Ошибка сервера"); }
        }

        async function loadReports() {
            const container = document.getElementById('reports-archive');
            container.innerHTML = `<div class="back-link" onclick="showPage('inst-page')">Назад</div><h2>История</h2>`;
            try {
                const response = await fetch('http://127.0.0.1:8000/reports');
                const data = await response.json();
                data.reverse().forEach(r => {
                    container.innerHTML += `
                        <div class="tool-card" onclick="tg.showPopup({title:'Отчет', message:'${r.details || "Готов"}', buttons:[{type:'close'}]})">
                            <i class="fa-solid fa-file-lines" style="color:var(--accent-color)"></i>
                            <div><b>@${r.username}</b><br><small>${r.date}</small></div>
                        </div>`;
                });
            } catch(e) {}
        }
    </script>
</body>
</html>
