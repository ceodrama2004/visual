<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DMH - Digital Marketing Helper</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(22, 27, 34, 0.7);
            --accent-color: #2f81f7;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --premium-gradient: linear-gradient(180deg, #FFFFFF 0%, #A3A3A3 100%);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0; padding: 20px;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* [1] PRELOADER DMH */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color); display: flex;
            justify-content: center; align-items: center; z-index: 1000;
            transition: opacity 0.6s ease;
        }
        .loader-logo { 
            font-size: 48px; font-weight: 800; letter-spacing: 8px; 
            background: var(--premium-gradient); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
        }

        /* [2] MAIN HUB (CENTERED) */
        #main-hub { 
            opacity: 0; transform: translateY(15px); transition: all 0.8s ease; 
            display: flex; flex-direction: column; align-items: center; width: 100%;
        }
        header { text-align: center; margin: 80px 0 50px 0; }
        .badge { 
            font-size: 11px; color: var(--accent-color); letter-spacing: 4px; 
            text-transform: uppercase; font-weight: 800; margin-bottom: 20px; display: block; 
        }
        
        h1 { 
            font-size: 38px; line-height: 1.1; font-weight: 800; letter-spacing: -1px; 
            background: var(--premium-gradient); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 0 auto; max-width: 300px;
        }

        .hub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; width: 100%; max-width: 360px; }
        .hub-item { 
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 32px; padding: 30px 10px; display: flex; flex-direction: column; 
            align-items: center; gap: 15px; transition: 0.3s;
        }
        .hub-item:active { transform: scale(0.94); background: rgba(47, 129, 247, 0.1); }
        .icon-circle {
            width: 50px; height: 50px; background: rgba(47, 129, 247, 0.1);
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
        }

        /* [3] PAGES */
        #inst-page, #analytics-view, #reports-archive { display: none; width: 100%; max-width: 400px; opacity: 0; transition: 0.4s ease; }
        .back-link { color: var(--text-dim); font-size: 14px; margin-bottom: 30px; display: flex; align-items: center; gap: 8px; cursor: pointer; }

        .tool-button { 
            background: var(--card-bg); border: 1px solid rgba(255,255,255,0.05); 
            padding: 22px; border-radius: 26px; display: flex; align-items: center; 
            gap: 16px; margin-bottom: 15px;
        }

        input {
            width: 100%; background: #000; border: 1px solid rgba(255,255,255,0.1);
            padding: 22px; border-radius: 20px; color: #fff; font-size: 18px;
            text-align: center; outline: none; box-sizing: border-box; margin: 25px 0;
        }
        
        .btn-main {
            width: 100%; background: #fff; color: #000; border: none;
            padding: 20px; border-radius: 20px; font-weight: 700; font-size: 16px;
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loader-logo">DMH</div>
    </div>

    <div id="main-hub">
        <header>
            <span class="badge">Welcome to DMH</span>
            <h1>Digital Marketing Helper</h1>
        </header>
        <div class="hub-grid">
            <div class="hub-item" onclick="showPage('inst-page')">
                <div class="icon-circle">
                    <i class="fa-brands fa-instagram" style="font-size: 24px; color: var(--accent-color);"></i>
                </div>
                <span style="font-size: 13px; font-weight: 700;">Instagram Helper</span>
            </div>
            <div class="hub-item" style="opacity: 0.2;">
                <div class="icon-circle" style="background: rgba(255,255,255,0.05);">
                    <i class="fa-solid fa-globe" style="font-size: 22px; color: #555;"></i>
                </div>
                <span style="font-size: 13px; font-weight: 700;">Web Analyzer</span>
            </div>
        </div>
    </div>

    <div id="inst-page">
        <div class="back-link" onclick="showPage('main-hub')"><i class="fa-solid fa-chevron-left"></i> Назад в Hub</div>
        <h2 style="font-size: 36px; margin-bottom: 30px; letter-spacing: -1px;">Instagram</h2>
        
        <div class="tool-button" onclick="showPage('analytics-view')">
            <i class="fa-solid fa-wand-magic-sparkles" style="font-size: 22px; color: var(--accent-color);"></i>
            <div style="flex-grow: 1;">
                <h4 style="margin: 0; font-size: 18px;">Аналитика</h4>
                <p style="margin: 4px 0 0 0; font-size: 13px; color: var(--text-dim);">Разбор аккаунта через AI</p>
            </div>
            <i class="fa-solid fa-chevron-right" style="color: var(--text-dim); font-size: 12px;"></i>
        </div>

        <div class="tool-button" onclick="loadReports().then(() => showPage('reports-archive'))">
            <i class="fa-solid fa-box-archive" style="font-size: 20px; color: var(--text-dim);"></i>
            <div style="flex-grow: 1;">
                <h4 style="margin: 0; font-size: 16px;">Архив отчетов</h4>
            </div>
        </div>
    </div>

    <div id="analytics-view">
        <div class="back-link" onclick="showPage('inst-page')"><i class="fa-solid fa-chevron-left"></i> К инструментам</div>
        <div style="background: var(--card-bg); padding: 35px 25px; border-radius: 35px; border: 1px solid rgba(255,255,255,0.05); text-align: center;">
            <h3 style="margin-top: 0; font-size: 24px;">Анализ профиля</h3>
            <p style="color: var(--text-dim); font-size: 15px;">Введите никнейм конкурента или свой</p>
            <input type="text" id="username" placeholder="username">
            <button class="btn-main" onclick="startAI()">ЗАПУСТИТЬ AI</button>
        </div>
    </div>

    <div id="reports-archive"></div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.headerColor = "#050505";

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    const hub = document.getElementById('main-hub');
                    hub.style.opacity = '1';
                    hub.style.transform = 'translateY(0)';
                }, 600);
            }, 1200);
        };

        function showPage(id) {
            tg.HapticFeedback.impactOccurred('medium');
            ['main-hub', 'inst-page', 'analytics-view', 'reports-archive'].forEach(p => {
                const el = document.getElementById(p);
                if(el) { el.style.display = 'none'; el.style.opacity = '0'; }
            });
            
            const target = document.getElementById(id);
            target.style.display = 'block';
            setTimeout(() => target.style.opacity = '1', 50);
        }

        async function startAI() {
            let user = document.getElementById('username').value;
            if(!user) return tg.showAlert("Введите ник!");
            
            tg.MainButton.setText("АНАЛИЗ...").show();
            try {
                const response = await fetch('http://127.0.0.1:8000/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: user, user_id: 0})
                });
                const res = await response.json();
                tg.showAlert(res.message);
                tg.MainButton.hide();
                showPage('inst-page');
            } catch(e) {
                tg.showAlert("Сервер не отвечает");
                tg.MainButton.hide();
            }
        }

        async function loadReports() {
            const container = document.getElementById('reports-archive');
            container.innerHTML = `<div class="back-link" onclick="showPage('inst-page')">Назад</div><h2 style="font-size:30px;">Ваши отчеты</h2>`;
            try {
                const response = await fetch('http://127.0.0.1:8000/reports');
                const data = await response.json();
                data.reverse().forEach(r => {
                    container.innerHTML += `
                        <div class="tool-button" onclick="tg.showPopup({title:'Отчет', message:'${r.details || "В обработке"}', buttons:[{type:'close'}]})">
                            <i class="fa-solid fa-file-invoice" style="color:var(--accent-color)"></i>
                            <div><b>@${r.username}</b><br><small style="color:var(--text-dim)">${r.date}</small></div>
                        </div>`;
                });
            } catch(e) {}
        }
    </script>
</body>
</html>
