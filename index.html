<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Strategy App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: var(--tg-theme-secondary-bg-color);
            padding: 15px;
            border-radius: 12px;
            width: 90%;
            margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        button {
            background-color: var(--tg-theme-button-color);
            color: var(--tg-theme-button-text-color);
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>Анализ Стратегии</h1>
    <div class="card">
        <h3>Анализ конкурента</h3>
        <p>Нажмите кнопку ниже, чтобы начать сбор данных.</p>
        <button onclick="showAlert()">Запустить ИИ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        function showAlert() {
            tg.showAlert("ИИ начинает анализ конкурентов...");
        }
    </script>
</body>
</html>
