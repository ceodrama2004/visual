<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DMH - Easy Marketing</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #111111;
            --accent-color: #2f81f7;
            --text-main: #ffffff;
            --text-dim: #8b949e;
        }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            overflow-x: hidden;
        }
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; justify-content: center; align-items: center; z-index: 1000;
        }
        .loader-logo { font-size: 32px; font-weight: 800; letter-spacing: 2px; }

        header { text-align: center; margin: 30px 0; }
        .badge { font-size: 10px; color: var(--accent-color); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 5px; display: block; }
        h1 { font-size: 28px; margin: 0; font-weight: 700; }

        /* Тот самый визуал главного экрана */
        .hub-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }
        .hub-item {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }
        .hub-item i { font-size: 35px; }
        .hub-item span { font-size: 14px; font-weight: 500; }
        .locked { opacity: 0.3; }

        /* Вспомогательные страницы */
        #inst-page, #analytics-view, #reports-archive { display: none; }
        
        .back-link { color: var(--text-dim); margin-bottom: 20px; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        
        .tool-button {
            background: var(--card-bg);
            padding: 18px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        input {
            width: 100%; padding: 18px; border-radius: 15px;
            border: 1px solid #333; background: #000; color: #fff;
            text-align: center; margin: 20px 0; font-size: 16px; box-sizing: border-box;
        }
        .btn-main {
            width: 100%; padding: 18px; border-radius: 15px;
            background: #fff; color: #000; font-weight: 700; border: none; font-size: 16px;
        }

        .reports-nav {
            position: absolute; top: 0; right: 0;
            background: #1a1a1a; padding: 10px; border-radius: 12px;
            text-align: center; border: 1px solid #333;
        }
    </style>
</head>
<body>
    <div id="loader"><div class="loader-logo">DMH</div></div>

    <div id="main-hub">
        <header>
            <span class="badge">MARKETING OS</span>
            <h1>Digital Helper</h1>
        </header>
        <div class="hub-grid">
            <div class="hub-item" onclick="showPage('inst-page')">
                <i class="fa-brands fa-instagram" style="color: #E1306C;"></i>
                <span>Instagram</span>
            </div>
            <div class="hub-item locked">
                <i class="fa-solid fa-lock" style="color: #444;"></i>
                <span>Web AI</span>
            </div>
        </div>
    </div>

    <div id="inst-page">
        <div style="position: relative;">
            <div class="back-link" onclick="showPage('main-hub')">
                <i class="fa-solid fa-arrow-left"></i> Назад
            </div>
            <div class="reports-nav" onclick="loadReports().then(() => showPage('reports-archive'))">
                <i class="fa-solid fa-box-archive"></i>
                <div style="font-size: 8px; font-weight: bold; margin-top: 3px;">ОТЧЕТЫ</div>
            </div>
            <h2 style="margin-top: 10px;">Instagram Tools</h2>
        </div>

        <div class="tool-button" onclick="showPage('analytics-view')">
            <i class="fa-solid fa-chart-line" style="color: var(--accent-color); font-size: 24px;"></i>
            <div>
                <h4 style="margin:0">Аналитика профиля</h4>
                <p style="margin:4px 0 0 0; font-size:12px; color:var(--text-dim)">Разбор аккаунта нейросетью</p>
            </div>
        </div>
    </div>

    <div id="analytics-view">
        <div class="back-link" onclick="showPage('inst-page')"><i class="fa-solid fa-arrow-left"></i> Назад</div>
        <div style="background: var(--card-bg); padding: 30px; border-radius: 25px; text-align: center;">
            <i class="fa-brands fa-instagram" style="font-size: 50px; margin-bottom: 20px;"></i>
            <h3>Введите никнейм</h3>
            <input type="text" id="username" placeholder="например: @cristiano">
            <button class="btn-main" onclick="startAI()">НАЧАТЬ АНАЛИЗ</button>
        </div>
    </div>

    <div id="reports-archive"></div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        window.onload = () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                showPage('main-hub');
            }, 800);
        };

        function showPage(id) {
            ['main-hub', 'inst-page', 'analytics-view', 'reports-archive'].forEach(p => {
                document.getElementById(p).style.display = 'none';
            });
            document.getElementById(id).style.display = 'block';
        }

        async function startAI() {
            const user = document.getElementById('username').value;
            if(!user) return tg.showAlert("Ник не введен!");
            
            try {
                const response = await fetch('http://127.0.0.1:8000/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: user, user_id: 0})
                });
                const res = await response.json();
                tg.showAlert(res.message);
                document.getElementById('username').value = '';
                showPage('inst-page');
            } catch(e) { tg.showAlert("Ошибка: Сервер не запущен!"); }
        }

        async function loadReports() {
            const container = document.getElementById('reports-archive');
            container.innerHTML = `
                <div class="back-link" onclick="showPage('inst-page')"><i class="fa-solid fa-arrow-left"></i> Назад</div>
                <h2 style="margin-bottom:25px;">Ваши отчеты</h2>
            `;
            try {
                const response = await fetch('http://127.0.0.1:8000/reports');
                const data = await response.json();
                data.reverse().forEach(r => {
                    container.innerHTML += `
                        <div class="tool-button" onclick="tg.showPopup({title: 'Анализ @${r.username}', message: '${r.details}', buttons: [{type: 'close'}]})">
                            <i class="fa-solid fa-file-invoice" style="color: var(--accent-color);"></i>
                            <div style="flex-grow:1">
                                <b style="font-size:16px;">@${r.username}</b><br>
                                <small style="color:var(--text-dim)">${r.date} • Оценка: ${r.score}</small>
                            </div>
                            <span style="font-size:10px; color:#2ff771; background:rgba(47,247,113,0.1); padding:4px 8px; border-radius:8px;">${r.status}</span>
                        </div>`;
                });
            } catch(e) { container.innerHTML += "<p>Ошибка загрузки</p>"; }
        }
    </script>
</body>
</html>
