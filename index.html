<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Digital Helper</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: #111418;
            --accent-color: #2f81f7;
            --text-main: #ffffff;
            --text-dim: #8b949e;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header { text-align: center; margin: 60px 0 40px 0; }
        .badge { font-size: 11px; color: #2f81f7; letter-spacing: 3px; text-transform: uppercase; font-weight: bold; margin-bottom: 15px; display: block; }
        h1 { font-size: 38px; margin: 0; font-weight: 700; line-height: 1.1; }

        /* СЕТКА ГЛАВНОГО ЭКРАНА 1 К 1 */
        .hub-grid {
            display: flex;
            gap: 20px;
            width: 100%;
            max-width: 400px;
            justify-content: center;
        }

        .hub-item {
            background: var(--card-bg);
            border-radius: 28px;
            width: 160px;
            height: 160px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 15px;
            cursor: pointer;
            text-decoration: none;
            color: white;
            transition: transform 0.2s;
        }

        .hub-item:active { transform: scale(0.95); }

        .hub-item i { font-size: 28px; }
        .hub-item span { font-size: 14px; font-weight: 600; text-align: center; width: 80%; }
        .locked { opacity: 0.2; }

        /* СТРАНИЦЫ */
        #main-hub { width: 100%; display: flex; flex-direction: column; align-items: center; }
        #inst-page, #analytics-view, #reports-archive { display: none; width: 100%; max-width: 400px; }

        .back-link { color: var(--text-dim); margin-bottom: 30px; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 16px; }

        .tool-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            cursor: pointer;
        }

        .reports-nav-btn {
            position: absolute; top: 20px; right: 20px;
            background: var(--card-bg); padding: 12px; border-radius: 15px;
            text-align: center; border: 1px solid #222;
        }

        input {
            width: 100%; padding: 22px; border-radius: 20px;
            border: 1px solid #222; background: #000; color: #fff;
            text-align: center; margin: 25px 0; font-size: 18px; box-sizing: border-box; outline: none;
        }

        .btn-action {
            width: 100%; padding: 20px; border-radius: 20px;
            background: #fff; color: #000; font-weight: 700; border: none; font-size: 16px;
        }

        /* ЛОУДЕР */
        #loader { position: fixed; inset: 0; background: #000; display: flex; justify-content: center; align-items: center; z-index: 1000; }
    </style>
</head>
<body>
    <div id="loader"><h2 style="letter-spacing: 5px;">DMH</h2></div>

    <div id="main-hub">
        <header>
            <span class="badge">WELCOME TO DMH</span>
            <h1>Digital Marketing Helper</h1>
        </header>
        <div class="hub-grid">
            <div class="hub-item" onclick="showPage('inst-page')">
                <div style="background: rgba(47, 129, 247, 0.1); width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center;">
                    <i class="fa-brands fa-instagram" style="color: var(--accent-color);"></i>
                </div>
                <span>Instagram Helper</span>
            </div>
            <div class="hub-item locked">
                <i class="fa-solid fa-globe" style="color: #333;"></i>
                <span>Web Site Analyzer</span>
            </div>
        </div>
    </div>

    <div id="inst-page">
        <div class="back-link" onclick="showPage('main-hub')"><i class="fa-solid fa-chevron-left"></i> Назад</div>
        <div class="reports-nav-btn" onclick="loadReports().then(() => showPage('reports-archive'))">
            <i class="fa-solid fa-box-archive" style="color: var(--accent-color);"></i>
            <div style="font-size: 9px; margin-top: 4px;">ОТЧЕТЫ</div>
        </div>
        <h2 style="font-size: 32px; margin-bottom: 30px;">Instagram</h2>
        <div class="tool-card" onclick="showPage('analytics-view')">
            <i class="fa-solid fa-wand-magic-sparkles" style="font-size: 24px; color: var(--accent-color);"></i>
            <div>
                <h4 style="margin:0; font-size: 18px;">Аналитика</h4>
                <p style="margin:5px 0 0 0; font-size:13px; color:var(--text-dim)">Полный разбор вашего профиля</p>
            </div>
        </div>
    </div>

    <div id="analytics-view">
        <div class="back-link" onclick="showPage('inst-page')"><i class="fa-solid fa-chevron-left"></i> Назад</div>
        <div style="text-align: center; margin-top: 20px;">
            <h3 style="font-size: 26px;">Анализ профиля</h3>
            <p style="color: var(--text-dim);">Введите никнейм аккаунта</p>
            <input type="text" id="username" placeholder="username">
            <button class="btn-action" onclick="startAI()">НАЧАТЬ АНАЛИЗ</button>
        </div>
    </div>

    <div id="reports-archive"></div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        window.onload = () => {
            setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 600);
        };

        function showPage(id) {
            ['main-hub', 'inst-page', 'analytics-view', 'reports-archive'].forEach(p => {
                document.getElementById(p).style.display = 'none';
            });
            document.getElementById(id).style.display = 'block';
        }

        async function startAI() {
            const user = document.getElementById('username').value;
            if(!user) return tg.showAlert("Введите ник!");
            try {
                const response = await fetch('http://127.0.0.1:8000/analyze', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username: user, user_id: 0})
                });
                const res = await response.json();
                tg.showAlert(res.message);
                document.getElementById('username').value = '';
                showPage('inst-page');
            } catch(e) { tg.showAlert("Ошибка соединения!"); }
        }

        async function loadReports() {
            const container = document.getElementById('reports-archive');
            container.innerHTML = `<div class="back-link" onclick="showPage('inst-page')"><i class="fa-solid fa-chevron-left"></i> Назад</div><h2 style="font-size:30px;">Архив</h2>`;
            try {
                const response = await fetch('http://127.0.0.1:8000/reports');
                const data = await response.json();
                data.reverse().forEach(r => {
                    container.innerHTML += `
                        <div class="tool-card" onclick="tg.showPopup({title: 'Анализ @${r.username}', message: '${r.details || "Готов"}', buttons: [{type: 'close'}]})">
                            <i class="fa-solid fa-file-invoice" style="color: var(--accent-color); font-size: 20px;"></i>
                            <div style="flex-grow:1">
                                <b style="font-size:16px;">@${r.username}</b><br>
                                <small style="color:var(--text-dim)">${r.date} • Оценка: ${r.score}</small>
                            </div>
                        </div>`;
                });
            } catch(e) { container.innerHTML += "<p>Ошибка загрузки</p>"; }
        }
    </script>
</body>
</html>
