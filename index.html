<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DMH - Digital Marketing Helper</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161b22;
            --accent-color: #2f81f7;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --border: 1px solid rgba(255, 255, 255, 0.08);
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        /* Заголовок - Дорогой вид */
        header {
            margin-bottom: 30px;
            padding-top: 10px;
        }

        .welcome-text {
            font-size: 14px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
            margin-bottom: 8px;
            display: block;
        }

        h1 {
            font-size: 28px;
            margin: 0;
            font-weight: 700;
            letter-spacing: -1px;
        }

        /* Сетка модулей */
        .modules-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* Две колонки */
            gap: 12px;
        }

        .module-card {
            background: var(--card-bg);
            border: var(--border);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .module-card:active {
            transform: scale(0.95);
            background: #1c2128;
        }

        .module-icon {
            width: 40px;
            height: 40px;
            background: rgba(47, 129, 247, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent-color);
            font-size: 18px;
        }

        .module-card h3 {
            margin: 0;
            font-size: 15px;
            font-weight: 600;
            line-height: 1.2;
        }

        /* Окно инструмента */
        #inst-tool { display: none; }

        .analysis-block {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: var(--border);
        }

        input {
            width: 100%;
            background: #0d1117;
            border: var(--border);
            padding: 14px;
            border-radius: 12px;
            color: white;
            margin: 15px 0;
            box-sizing: border-box;
            outline: none;
        }

        .btn-analyze {
            background: var(--accent-color);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            box-shadow: 0 4px 15px rgba(47, 129, 247, 0.2);
        }

        .hidden { display: none; }

        .back-btn {
            background: none;
            border: var(--border);
            color: var(--text-main);
            padding: 8px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div id="main-screen">
        <header>
            <span class="welcome-text">Welcome to DMH</span>
            <h1>Digital Marketing<br>Helper</h1>
        </header>

        <div class="modules-grid">
            <div class="module-card" onclick="openModule('inst-tool')">
                <div class="module-icon">
                    <i class="fa-brands fa-instagram"></i>
                </div>
                <h3>Instagram<br>Helper</h3>
            </div>

            <div class="module-card" style="opacity: 0.4; cursor: default;">
                <div class="module-icon"><i class="fa-solid fa-globe"></i></div>
                <h3>Web Site<br>Analyzer</h3>
            </div>
        </div>
    </div>

    <div id="inst-tool">
        <button class="back-btn" onclick="goBack()">← Назад</button>
        
        <div class="analysis-block">
            <span style="color: var(--accent-color); font-size: 12px; font-weight: 700; text-transform: uppercase;">Instagram Analytix</span>
            <h2 style="margin: 10px 0 5px 0;">Instagram Helper</h2>
            <p style="color: var(--text-dim); font-size: 14px; margin-bottom: 20px;">Анализ торгового предложения и конкурентов</p>
            
            <input type="text" id="target-link" placeholder="@username">
            <button class="btn-analyze" onclick="runAnalysis()">АНАЛИЗИРОВАТЬ</button>
        </div>

        <div id="results" class="hidden" style="margin-top: 20px;">
            <div class="analysis-block">
                <p id="res-text" style="font-size: 14px; line-height: 1.6;"></p>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = "#0b0e14";
        tg.headerColor = "#0b0e14";

        function openModule(id) {
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById(id).style.display = 'block';
        }

        function goBack() {
            document.getElementById('inst-tool').style.display = 'none';
            document.getElementById('main-screen').classList.remove('hidden');
        }

        function runAnalysis() {
            let link = document.getElementById('target-link').value;
            if(!link) return tg.showAlert("Введите никнейм!");
            
            tg.MainButton.setText("ПОДКЛЮЧЕНИЕ К ИИ...").show();
            
            setTimeout(() => {
                document.getElementById('results').classList.remove('hidden');
                document.getElementById('res-text').innerHTML = "<b>Анализ завершен:</b><br>Магазин имеет сильное визуальное оформление, но отсутствует четкий призыв к действию в шапке профиля. Рекомендуется обновить Bio.";
                tg.MainButton.hide();
                tg.HapticFeedback.impactOccurred('medium');
            }, 2000);
        }
    </script>
</body>
</html>
