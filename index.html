<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>INST HELPER PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #0b0e14; /* Глубокий черный с синим отливом */
            --card-bg: #161b22;
            --accent-color: #2f81f7; /* Насыщенный синий */
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --border-color: rgba(255, 255, 255, 0.1);
            --glow: 0 0 15px rgba(47, 129, 247, 0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Карточка модуля на главном экране */
        .module-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 20px;
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .module-card:active {
            transform: scale(0.97);
            background: #1c2128;
        }

        .module-card h2 { 
            margin: 0; 
            font-size: 22px; 
            color: var(--accent-color);
            text-shadow: var(--glow);
        }
        
        .module-card p { 
            margin: 8px 0 0; 
            color: var(--text-dim); 
            font-size: 14px; 
            line-height: 1.4; 
        }

        /* Стили для инструментов */
        .analysis-block {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            border: 1px solid var(--border-color);
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            background: #0d1117;
            border: 1px solid var(--border-color);
            padding: 14px;
            border-radius: 10px;
            color: white;
            margin: 12px 0;
            box-sizing: border-box;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--accent-color); box-shadow: var(--glow); }

        .btn-analyze {
            background: var(--accent-color);
            color: white;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            box-shadow: var(--glow);
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            background: rgba(47, 129, 247, 0.15);
            color: var(--accent-color);
            margin-bottom: 12px;
            border: 1px solid rgba(47, 129, 247, 0.3);
        }

        .hidden { display: none; }
        #inst-tool { display: none; }

        .back-btn {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            color: var(--accent-color);
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="main-screen">
        <h1 style="font-size: 26px; margin-bottom: 4px; letter-spacing: -0.5px;">My AI Hub</h1>
        <p style="color: var(--text-dim); margin-bottom: 24px; font-size: 15px;">Выберите рабочий инструмент</p>

        <div class="module-card" onclick="openModule('inst-tool')">
            <div class="badge">INSTAGRAM</div>
            <h2>INST HELPER</h2>
            <p>Анализ конкурентов, офферов и стратегии продвижения.</p>
        </div>
    </div>

    <div id="inst-tool">
        <div style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px;">
            <button class="back-btn" onclick="goBack()">←</button>
            <h2 style="margin: 0; font-size: 20px;">INST HELPER</h2>
        </div>

        <div class="analysis-block">
            <h3 style="margin-top:0; font-size: 18px;">🔎 Объект анализа</h3>
            <p style="color: var(--text-dim); font-size: 13px;">Укажите ссылку или @username магазина</p>
            <input type="text" id="target-link" placeholder="@shop_name">
            <button class="btn-analyze" onclick="runAnalysis()">ЗАПУСТИТЬ ИИ</button>
        </div>

        <div id="results" class="hidden">
            <div class="analysis-block" style="border-top: 3px solid var(--accent-color);">
                <div class="badge">AI INSIGHT</div>
                <p id="res-text" style="font-size: 14px; line-height: 1.6; color: #cbd5e1;"></p>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.backgroundColor = "#0b0e14";
        tg.headerColor = "#0b0e14";

        function openModule(id) {
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById(id).style.display = 'block';
        }

        function goBack() {
            document.getElementById('inst-tool').style.display = 'none';
            document.getElementById('main-screen').classList.remove('hidden');
        }

        function runAnalysis() {
            let link = document.getElementById('target-link').value;
            if(!link) return tg.showAlert("Нужно ввести ссылку!");
            
            tg.MainButton.setText("ИДЕТ ГЛУБОКИЙ АНАЛИЗ...").show();
            
            setTimeout(() => {
                document.getElementById('results').classList.remove('hidden');
                document.getElementById('res-text').innerHTML = "<b>Анализ завершен:</b><br>Магазин использует агрессивную стратегию скидок. Слабое место — низкое вовлечение в комментариях. Рекомендуем внедрить квиз-механики в сторис.";
                tg.MainButton.hide();
                tg.HapticFeedback.impactOccurred('heavy');
            }, 2500);
        }
    </script>
</body>
</html>
